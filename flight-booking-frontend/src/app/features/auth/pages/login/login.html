<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">✈</div>
      Sky<span>Travel</span>
    </div>

    <h1>Добро пожаловать</h1>
    <p class="auth-sub">Войдите в свой аккаунт</p>

    <div class="error-banner" *ngIf="errorMsg">
      ⚠ {{ errorMsg }}
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com"
             [class.error]="submitted && !email" (keyup.enter)="login()">
    </div>

    <div class="form-group">
      <label>
        Пароль
        <a routerLink="/auth/forgot" class="forgot-link">Забыли пароль?</a>
      </label>
      <div class="input-wrap">
        <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="password"
               placeholder="Введите пароль"
               [class.error]="submitted && !password" (keyup.enter)="login()">
        <button class="eye-btn" (click)="showPass = !showPass">
          {{ showPass ? '🙈' : '👁' }}
        </button>
      </div>
    </div>

    <button class="btn-auth" [class.loading]="isLoading" (click)="login()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Войти</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>

    <div class="auth-divider"><span>или</span></div>

    <button class="btn-social google" (click)="loginWithGoogle()">
      <span class="social-icon">G</span> Войти через Google
    </button>

    <p class="auth-footer">
      Нет аккаунта? <a routerLink="/auth/register">Зарегистрироваться</a>
    </p>
  </div>

  <div class="auth-bg-text">SkyTravel</div>
</div>
